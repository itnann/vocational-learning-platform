#微服务配置
spring:
  application:
    name: content-api # nacos服务名称
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: 192.168.101.65:8848
      discovery: # nacos服务注册相关配置
        namespace: dev_yaojiuye
        group: yaojiuye-plus-project
      config: # nacos配置文件相关配置
        namespace: dev_yaojiuye
        group: yaojiuye-plus-project
        file-extension: yaml
        refresh-enabled: true
        extension-configs:
          - data-id: content-service-${spring.profiles.active}.yaml
            group: yaojiuye-plus-project
            refresh: true
        shared-configs:
          - data-id: swagger-${spring.profiles.active}.yaml
            group: yaojiuye-plus-common
            refresh: true
          - data-id: logging-${spring.profiles.active}.yaml
            group: yaojiuye-plus-common
            refresh: true
          - data-id: freemarker-config-${spring.profiles.active}.yaml
            group: yaojiuye-plus-common
            refresh: true

